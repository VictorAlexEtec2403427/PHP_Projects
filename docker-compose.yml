services:
  terminal:
    container_name: alpine_linux
    image: alpine:latest
    stdin_open: true
    tty: true
    volumes:
      - ./dates:/home
    working_dir: /home
    command: /bin/sh
    networks:
      - escola_network

  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: escola_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - escola_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_gui
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql_db
      MYSQL_ROOT_PASSWORD: root
    networks:
      - escola_network

networks:
  escola_network:
    driver: bridge

volumes:
  db_data: